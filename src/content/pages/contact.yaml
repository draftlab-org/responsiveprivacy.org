description: Get in touch with the Responsive Privacy team.
sections:
  - type: feature
    background:
      bgColor: blue
    title: Help shape the future of Responsive Privacy
    layout: split
    illustrationPosition: top
    body: |-
      We're building Responsive Privacy as a collaborative effort.

      We're particularly interested in working with organizations and funders who want to:

      - pilot the approach in real-world contexts
      - co-design implementations and training models
      - improve the core module across different web environments

    bottomLine: |-
      Over time, we aim to evolve Responsive Privacy into a community-governed, widely adopted standard for managing personal data exposure online.

      Contact us to explore collaboration or funding opportunities.

  - type: contactForm
    background:
