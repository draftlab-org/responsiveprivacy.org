# ============================================================================
# Pages CMS Configuration
# Documentation: https://pagescms.org/docs/configuration/
# ============================================================================

# ============================================================================
# MEDIA
# ============================================================================
media:
  - name: images
    label: All Images
    input: src/assets
    output: /src/assets

# ============================================================================
# REUSABLE COMPONENTS
# ============================================================================
components:
  # --------------------------------------------------------------------------
  # Primitives
  # --------------------------------------------------------------------------

  button:
    type: object
    fields:
      - name: variant
        label: Variant
        type: select
        options:
          values:
            - { label: Primary, value: primary }
            - { label: Secondary, value: secondary }
            - { label: Outline, value: outline }
            - { label: Ghost, value: ghost }
        required: true
        default: primary
      - name: size
        label: Size
        type: select
        options:
          values:
            - { label: Small, value: sm }
            - { label: Medium, value: md }
            - { label: Large, value: lg }
        required: true
        default: md
      - name: text
        label: Text
        type: string
        required: true
      - name: href
        label: Link URL
        type: string
        required: true

  card:
    type: object
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: content
        label: Content
        type: rich-text
      - name: image
        label: Image
        type: image
      - name: button
        label: Button
        component: button

  feature_item:
    type: object
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: string

  # --------------------------------------------------------------------------
  # Navigation
  # --------------------------------------------------------------------------

  flexible_link:
    type: block
    blockKey: type
    description: Link that can reference an internal page or external URL
    blocks:
      - name: internal
        label: Internal Page Link
        fields:
          - name: pageRef
            label: Page Reference
            type: reference
            required: true
            options:
              collection: pages
              value: '/{permalink}'
              label: '{title} (/{permalink})'
      - name: external
        label: External Link
        fields:
          - name: url
            label: External URL
            type: string
            required: true
            pattern:
              message: 'Must be a valid URL starting with http:// or https://'
              regex: '^https?://.+'

  navigation_menu_item:
    type: block
    blockKey: type
    blocks:
      - name: link
        label: Single Link
        fields:
          - name: label
            label: Link Label
            type: string
            required: true
          - name: link
            label: Link
            component: flexible_link
            required: true
          - name: description
            label: Description
            type: string
      - name: dropdown
        label: Dropdown Menu
        fields:
          - name: label
            label: Menu Label
            type: string
            required: true
          - name: children
            label: Menu Links
            type: object
            list: true
            required: true
            fields:
              - name: label
                label: Link Label
                type: string
                required: true
              - name: link
                label: Link
                component: flexible_link
                required: true
              - name: description
                label: Description
                type: string

  # --------------------------------------------------------------------------
  # Layout
  # --------------------------------------------------------------------------

  background_select:
    type: object
    fields:
      - name: bgColor
        label: Color
        type: select
        options:
          values:
            - { label: White, value: white }
            - { label: Yellow, value: yellow }
            - { label: Pink, value: pink }
            - { label: Blue, value: blue }
        default: white
      - name: bgType
        label: Type
        type: select
        options:
          values:
            - { label: Full-width, value: full }
            - { label: Contained, value: contained }
        default: full

  # --------------------------------------------------------------------------
  # Section components
  # --------------------------------------------------------------------------

  feature_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: title
        label: Title
        type: string
        required: true
      - name: titleSize
        label: Title Size
        type: select
        options:
          values:
            - { label: H1, value: 1 }
            - { label: H2, value: 2 }
            - { label: H3, value: 3 }
            - { label: H4, value: 4 }
            - { label: H5, value: 5 }
            - { label: H6, value: 6 }
        default: 2
      - name: body
        label: Body
        type: rich-text
        description: Markdown body text
      - name: bodySize
        label: Body Size
        type: select
        options:
          values:
            - { label: Normal, value: normal }
            - { label: Large (50% bigger), value: large }
        default: normal
      - name: illustration
        label: Illustration
        type: image
      - name: illustrationPosition
        label: Illustration Position
        type: select
        options:
          values:
            - { label: Top (centered), value: top }
            - { label: Bottom (centered), value: bottom }
            - { label: Left, value: left }
            - { label: Right, value: right }
        default: top
      - name: items
        label: Items (checklist)
        component: feature_item
        list: true
        description: When provided, renders as a 2-column layout with checklist on the right

  richtext_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: withTOC
        label: Include Table of Contents
        type: boolean
        default: false
      - name: content
        label: Content
        type: rich-text
        required: true

  button_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: title
        label: Title (Optional)
        type: string
      - name: buttons
        label: Buttons
        component: button
        list: true

  card_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: rich-text
      - name: cards
        label: Cards
        component: card
        list: true
      - name: buttons
        label: Action Buttons
        component: button
        list: true

  flexi_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: rich-text
      - name: sections
        label: Nested Sections
        component: section
        list: true

  section:
    type: block
    blockKey: type
    blocks:
      - name: feature
        label: Feature Section
        component: feature_section
      - name: richText
        label: Rich Text Section
        component: richtext_section
      - name: button
        label: Button Section
        component: button_section
      - name: card
        label: Card Section
        component: card_section

# ============================================================================
# CONTENT COLLECTIONS
# ============================================================================
content:
  # --------------------------------------------------------------------------
  # Pages
  # --------------------------------------------------------------------------
  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml
    filename: '{fields.permalink}.yaml'
    view:
      fields: [title, description, status]
      primary: title
    fields:
      - name: title
        label: Page Title
        type: string
        required: true

      - name: permalink
        label: Permalink
        type: string
        required: true
        pattern:
          message: "This must be a web-safe string like 'about-us' or 'how-it-works'."
          regex: '^[a-zA-Z0-9_-]*$'

      - name: status
        label: Status
        type: select
        required: true
        default: draft
        options:
          values:
            - { label: Draft, value: draft }
            - { label: Published, value: published }
            - { label: Archived, value: archived }

      - name: description
        label: Page Description
        type: rich-text

      - name: heroImage
        label: Hero Image (social card)
        type: image
        description: Image used for OG / social share previews

      - name: sections
        label: Page Sections
        type: block
        list: true
        blockKey: type
        blocks:
          - name: feature
            label: Feature Section
            component: feature_section
          - name: richText
            label: Rich Text Section
            component: richtext_section
          - name: button
            label: Button Section
            component: button_section
          - name: card
            label: Card Section
            component: card_section
          - name: flexi
            label: Flexi Section
            component: flexi_section

  # --------------------------------------------------------------------------
  # Docs
  # --------------------------------------------------------------------------
  - name: research
    label: Research
    type: collection
    path: src/content/research
    subfolders: true
    filename: '{fields.permalink}.md'
    view:
      fields: [title, chapter, order, status]
      primary: title
      sort: [chapterOrder, order]
      default:
        sort: chapterOrder
        order: asc
    fields:
      - name: permalink
        label: Permalink
        type: string
        required: true
        pattern:
          message: "Must be a web-safe string like 'my-doc-page'."
          regex: '^[a-zA-Z0-9_-]*$'

      - name: title
        label: Title
        type: string
        required: true

      - name: chapter
        label: Chapter
        type: string
        required: true

      - name: chapterOrder
        label: Chapter Order
        type: number
        required: true

      - name: order
        label: Page Order
        type: number
        required: true

      - name: status
        label: Status
        type: select
        required: true
        default: draft
        options:
          values:
            - { label: Draft, value: draft }
            - { label: Published, value: published }
            - { label: Archived, value: archived }

      - name: description
        label: Description
        type: string

      - name: body
        label: Body
        type: rich-text

  # --------------------------------------------------------------------------
  # Site Settings (singleton)
  # --------------------------------------------------------------------------
  - name: site-config
    label: Site Settings
    type: file
    path: src/content/site/config.json
    fields:
      - name: title
        label: Site Title
        type: string
        required: true
      - name: description
        label: Site Description
        type: string
        required: true
      - name: url
        label: Site URL
        type: string
        required: true
      - name: favicon
        label: Favicon Path
        type: string
        default: /favicon.svg
      - name: defaultOgImage
        label: Default Open Graph Image
        type: image
      - name: defaultLogoLight
        label: Logo (Light Background)
        type: image
      - name: defaultLogoDark
        label: Logo (Dark Background)
        type: image
      - name: defaultLogoSquare
        label: Logo (Square)
        type: image
      - name: social
        label: Social Media Links
        type: object
        fields:
          - { name: bluesky, label: BlueSky URL, type: string }
          - { name: mastodon, label: Mastodon URL, type: string }
          - { name: github, label: GitHub URL, type: string }
          - { name: linkedin, label: LinkedIn URL, type: string }
          - { name: x, label: X URL, type: string }
          - { name: facebook, label: Facebook URL, type: string }
          - { name: instagram, label: Instagram URL, type: string }
          - { name: youtube, label: YouTube URL, type: string }
      - name: footer
        label: Footer
        type: object
        fields:
          - name: description
            label: Footer Description
            type: string
          - name: bottom
            label: Bottom Text
            type: string
            required: true
      - name: cookieConsent
        label: Cookie Consent
        type: object
        fields:
          - name: message
            label: Banner Message
            type: rich-text
            required: true
          - name: googleAnalyticsId
            label: Google Analytics Measurement ID
            type: string

  # --------------------------------------------------------------------------
  # Navigation Menus
  # --------------------------------------------------------------------------
  - name: navigation
    label: Navigation Menus
    type: collection
    path: src/content/navigation
    format: json
    filename: '{{fields.slug}}.json'
    subfolders: false
    view:
      fields: [title]
      primary: title
    fields:
      - name: slug
        label: Menu ID
        type: string
        required: true
        pattern:
          message: "Must be a web-safe string like 'main' or 'footer-1'."
          regex: '^[a-zA-Z0-9_-]*$'
      - name: title
        label: Menu Title
        type: string
        required: true
      - name: items
        label: Menu Items
        component: navigation_menu_item
        list: true
        required: true
